<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
font-family: Arial, sans-serif;
background:#f5f5f5;
margin:0;
text-align:center;
}

h1{
background:#111;
color:white;
padding:15px;
margin:0;
}

.platos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

model-viewer{
width:100%;
height:400px;
background:white;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<h1>🍽️ MENÚ REALIDAD AUMENTADA</h1>

<div class="platos">

<model-viewer src="arroz.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate>
</model-viewer>

<model-viewer src="bife.glb"
ar
camera-controls
auto-rotate>
</model-viewer>

<model-viewer src="ceviche.glb"
ar
camera-controls
auto-rotate>
</model-viewer>

<model-viewer src="hamburguesa.glb"
ar
camera-controls
auto-rotate>
</model-viewer>

<model-viewer src="tigrillo.glb"
ar
camera-controls
auto-rotate>
</model-viewer>

</div>

</body>
</html>
